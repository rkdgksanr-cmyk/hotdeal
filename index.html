<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>오늘의 핫딜</title>

<style>
body{
    background:#f5f5f5;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    padding:40px;
}

.card{
    width:320px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card img{
    width:100%;
}

.content{
    padding:15px;
}

.price{
    color:#ff6600;
    font-size:28px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

fetch('https://raw.githubusercontent.com/rkdgksanr-cmyk/hotdeal/main/hotdeal.json')
.then(res => res.json())
.then(data => {

document.getElementById('app').innerHTML = `
<div class="card">

<img src="${data.imageUrl}">

<div class="content">

<h2>${data.productName}</h2>

<div class="price">
${data.salePrice}
</div>

<div>
정가 ${data.originalPrice}
</div>

<div>
할인율 ${data.discount}
</div>

<div>
${data.shopName}
</div>

</div>

</div>
`;

});

</script>

</body>
</html>
