<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 핫딜</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#f4f4f4;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

.card{
  width:340px;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.image-area{
  position:relative;
}

.image-area img{
  width:100%;
  display:block;
}

.badge{
  position:absolute;
  top:12px;
  left:12px;

  background:#ff7a00;
  color:white;

  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
}

.limit{
  position:absolute;
  top:12px;
  right:12px;

  background:rgba(0,0,0,.55);
  color:white;

  padding:8px 12px;
  border-radius:18px;
  font-size:13px;
}

.content{
  padding:16px;
}

.product-name{
  font-size:28px;
  font-weight:bold;
  margin-bottom:12px;
}

.price-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.sale-price{
  color:#ff6600;
  font-size:36px;
  font-weight:800;
}

.original-price{
  color:#999;
  text-decoration:line-through;
  font-size:15px;
}

.discount{
  background:#ff6600;
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:13px;
  font-weight:bold;
}

.shop{
  color:#666;
  margin-bottom:4px;
}

.distance{
  color:#666;
  margin-bottom:16px;
}

.visit-btn{
  width:100%;
  background:#ff7a00;
  color:white;
  border:none;
  border-radius:10px;
  padding:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.visit-btn:hover{
  opacity:.9;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

fetch("https://raw.githubusercontent.com/rkdgksanr-cmyk/hotdeal/main/hotdeal.json?v=" + Date.now())
.then(response => response.json())
.then(data => {

document.getElementById("app").innerHTML = `

<div class="card">

<div class="image-area">

<img src="${data.imageUrl}">

<div class="badge">
${data.badge}
</div>

<div class="limit">
📦 ${data.limit.text}
</div>

</div>

<div class="content">

<div class="product-name">
${data.product.name}
</div>

<div class="price-row">

<div class="sale-price">
${data.price.sale}
</div>

<div class="original-price">
${data.price.original}
</div>

<div class="discount">
-${data.price.discount}
</div>

</div>

<div class="shop">
🏪 ${data.shop.name}
</div>

<div class="distance">
📍 ${data.shop.distance}
</div>

<button class="visit-btn">
🚗 ${data.button.text}
</button>

</div>

</div>

`;

});

</script>

</body>
</html>
